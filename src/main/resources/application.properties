spring.application.name=Society

# ===============================
# JPA / Hibernate
# ===============================

# Automatically update schema
spring.jpa.hibernate.ddl-auto=create

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# Let Hibernate pick dialect automatically (PostgreSQL 17+ is supported)
# You can remove this line safely, but if you want to keep it, it?s fine:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Datasource
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/Society_Demo
spring.datasource.username=suresh
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Logging SQL + Parameters
# ===============================

# Log SQL queries
logging.level.org.hibernate.SQL=DEBUG

# Log parameter values
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE